apiVersion: apps/v1
kind: Deployment
metadata:
  name: voting-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: voting-app
  template:
    metadata:
      labels:
        app: voting-app
    spec:
      containers:
        - name: voting-container
          # Change the image with your image name in dockerhub repo
          image: voting:latest
          ports:
            - containerPort: 8080